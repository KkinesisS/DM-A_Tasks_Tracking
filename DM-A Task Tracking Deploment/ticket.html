<!DOCTYPE html>
<html>
<head>
<style>
body {
    background-color: #f4f6fc;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
}

.ticket-wrapper {
    position: relative;
    width: 320px;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    overflow: hidden;
}

.ticket-header {
    text-align: center;
    padding: 30px 20px 20px 20px;
}

.ticket-header img {
    width: 48px;
    height: 48px;
    margin-bottom: 15px;
}

.ticket-header h2 {
    margin: 0 0 10px 0;
    font-size: 1.25rem;
    color: #111;
    font-weight: bold;
}

.ticket-header p {
    margin: 0;
    font-size: 0.85rem;
    color: #888;
    line-height: 1.4;
}

.ticket-divider {
    position: relative;
    height: 20px;
    background: #ffffff;
}

.ticket-divider::before, .ticket-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 20px;
    height: 20px;
    background: #f4f6fc; /* Matches body background */
    border-radius: 50%;
    transform: translateY(-50%);
}

.ticket-divider::before {
    left: -10px;
}

.ticket-divider::after {
    right: -10px;
}

.ticket-divider-line {
    position: absolute;
    top: 50%;
    left: 20px;
    right: 20px;
    border-top: 2px dashed #e0e0e0;
    transform: translateY(-50%);
}

.ticket-body {
    padding: 20px;
}

.ticket-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.ticket-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 5px;
    letter-spacing: 0.5px;
}

.ticket-value {
    font-size: 0.95rem;
    color: #111;
    font-weight: 600;
}

.ticket-card-info {
    background: #f8f9fb;
    border-radius: 8px;
    padding: 12px 15px;
    display: flex;
    align-items: center;
    margin-top: 15px;
}

.ticket-card-icon {
    width: 32px;
    height: 20px;
    background: #ddd;
    border-radius: 4px;
    margin-right: 12px;
}

.ticket-card-text {
    font-size: 0.85rem;
    color: #111;
    font-weight: 500;
}

.ticket-card-subtext {
    font-size: 0.75rem;
    color: #888;
    margin-top: 2px;
}

.ticket-footer {
    padding: 20px;
    text-align: center;
}

.ticket-barcode {
    width: 100%;
    height: 60px;
    background: repeating-linear-gradient(
      90deg,
      #111,
      #111 2px,
      transparent 2px,
      transparent 4px,
      #111 4px,
      #111 5px,
      transparent 5px,
      transparent 8px
    );
    margin-bottom: 10px;
}

.ticket-barcode-text {
    font-size: 0.65rem;
    letter-spacing: 4px;
    color: #111;
}

.ticket-bottom-edge {
    height: 12px;
    background-image: radial-gradient(circle at 10px 0, transparent 10px, #ffffff 11px);
    background-size: 20px 10px;
    background-repeat: repeat-x;
    transform: rotate(180deg);
}

.copy-btn {
    width: 100%;
    padding: 12px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 15px;
}
</style>
</head>
<body>

<div class="ticket-wrapper">
    <div class="ticket-header">
        <span style="font-size: 40px;">🎉</span>
        <h2>Thank you!</h2>
        <p>Your request has been submitted<br>successfully</p>
    </div>
    
    <div class="ticket-divider">
        <div class="ticket-divider-line"></div>
    </div>
    
    <div class="ticket-body">
        <div class="ticket-row">
            <div>
                <div class="ticket-label">TICKET ID</div>
                <div class="ticket-value">task-123456789</div>
            </div>
            <div style="text-align: right;">
                <div class="ticket-label">STATUS</div>
                <div class="ticket-value">Open</div>
            </div>
        </div>
        
        <div class="ticket-row" style="margin-bottom: 0;">
            <div>
                <div class="ticket-label">DATE & TIME</div>
                <div class="ticket-value">19 Jun 2025 • 10:15</div>
            </div>
        </div>
        
        <div class="ticket-card-info">
            <span style="font-size: 20px; margin-right: 12px;">👤</span>
            <div>
                <div class="ticket-card-text">Maintenance Control</div>
                <div class="ticket-card-subtext">Will review shortly</div>
            </div>
        </div>
    </div>
    
    <div class="ticket-divider">
        <div class="ticket-divider-line"></div>
    </div>
    
    <div class="ticket-footer">
        <div class="ticket-barcode"></div>
        <div class="ticket-barcode-text">8937261 273610</div>
        
        <button class="copy-btn">Copy Ticket ID</button>
    </div>
    <div class="ticket-bottom-edge"></div>
</div>

</body>
</html>
